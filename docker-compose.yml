services:
  php:
    build:
      context: .
      dockerfile: Dockerfile-php
    container_name: chat_php
    volumes:
      - C:/inetpub/vhosts/chat/httpdocs:/var/www/chat
    networks:
      - chat_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    ports:
      - "8080:80"
      - "8081:8081"
    volumes:
      - C:/inetpub/vhosts/chat/httpdocs:/var/www/chat
      - C:/inetpub/vhosts/chat/httpdocs/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - chat_network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: chat_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chat
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: chat_pass
    ports:
      - "3307:3306"
    volumes:
      - chat_db_data:/var/lib/mysql
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: chat_phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - chat_network
    restart: unless-stopped

volumes:
  chat_db_data:

networks:
  chat_network:
    driver: bridge
